---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install Nginx
  package:
    name: nginx
    state: present

- name: Create website directory
  file:
    path: "{{ nginx_website_root }}"
    state: directory
    mode: '0755'

- name: Copy index.html
  copy:
    src: index.html
    dest: "{{ nginx_website_root }}/index.html"
    mode: '0644'

- name: Copy kitten image
  copy:
    src: files/kitten.jpg
    dest: "{{ nginx_website_root }}/kitten.jpg"
    mode: '0644'

- name: Remove default site symlink
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: restart nginx

- name: Configure site
  template:
    src: site.conf.j2
    dest: /etc/nginx/sites-available/{{ nginx_server_name }}
    mode: '0644'
  notify: restart nginx

- name: Enable site
  file:
    src: /etc/nginx/sites-available/{{ nginx_server_name }}
    dest: /etc/nginx/sites-enabled/{{ nginx_server_name }}
    state: link
  notify: restart nginx

- name: Ensure Nginx is running and enabled
  service:
    name: nginx
    state: started
    enabled: yes